<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RootChat - Ngobrol Santai</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Fira Code', monospace;
  background:#0a0a0a;
  color:#e0e0e0;
  display:flex;
  flex-direction:column;
  height:100vh;
  font-size:15px;
  line-height:1.7;
}

.header{
  background:#111;
  padding:20px;
  border-bottom:1px solid #00FF41;
  text-align:center;
  font-size:32px;
  font-weight:600;
  letter-spacing:2px;
  color:#00FF41 !important;
  text-shadow:0 0 10px #00FF41;
}

.chat-box{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.pesan{
  background:#111;
  padding:15px 20px;
  border-radius:5px;
  border:1px solid #222;
  border-left:3px solid #00FF41;
  max-width:70%;
  word-wrap:break-word;
}

.pesan b{
  color:#00FF41;
  font-weight:600;
}

.input-area{
  display:flex;
  padding:20px;
  background:#000;
  border-top:1px solid #00FF41;
}

.input-area input{
  flex:1;
  padding:12px;
  border:1px solid #222;
  border-radius:5px;
  background:#1e1e1e;
  color:#00FF41;
  margin-right:10px;
  outline:none;
  font-family:'Fira Code', monospace;
}

.input-area input:focus{
  border-color:#00FF41;
  box-shadow:0 0 8px #00FF41;
}

.input-area button{
  padding:12px 25px;
  border:none;
  border-radius:5px;
  background:#00FF41;
  color:#000;
  font-weight:600;
  cursor:pointer;
  font-family:'Fira Code', monospace;
  transition:0.3s;
}

.input-area button:hover{
  background:#39FF14;
  text-shadow:0 0 8px #00FF41;
}

#namaInput{width:180px}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#00FF41;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#39FF14}

/* Mobile Responsive */
@media screen and (max-width: 768px) {
  .header{font-size:24px !important;letter-spacing:1px;padding:15px}
  .pesan{max-width:85%;padding:12px 15px}
  .input-area{padding:15px;flex-direction:column;gap:10px}
  .input-area input{margin-right:0}
  #namaInput{width:100%}
  .input-area button{width:100%}
}
</style>
</head>
<body>
<div class="header">💬 RootChat - Room: rootchat</div>
<div class="chat-box" id="chatBox"></div>
<div class="input-area">
  <input type="text" id="namaInput" placeholder="Nama kamu..." maxlength="15">
  <input type="text" id="pesanInput" placeholder="Ketik pesan... Enter buat kirim">
  <button onclick="kirimPesan()">Kirim</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>

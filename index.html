<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RootAkses - Chat Komunitas</title>

  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root {
      --green:#00ff88;
      --bg:#000;
      --panel:#050505;
      --white:#fff;
      --red:#ff4d4d;
    }

    body {
      margin:0;
      font-family:'Fira Code', monospace;
      background:var(--bg);
      color:var(--green);
      height:100vh;
    }

    /* AUTH */
    .auth {
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:10px;
      padding:20px;
    }

    input,button{
      width:min(360px,90vw);
      padding:12px;
      border:1px solid var(--green);
      background:#000;
      color:var(--green);
      font:inherit;
      border-radius:6px;
      outline:none;
    }

    button{
      background:var(--green);
      color:#000;
      font-weight:700;
      cursor:pointer;
    }

    #status{
      font-size:12px;
      color:#fff;
      min-height:20px;
      text-align:center;
    }

    /* CHAT */
    .chat{
      display:none;
      flex-direction:column;
      height:100vh;
      background:var(--panel);
    }

    .header{
      padding:10px;
      border-bottom:1px solid var(--green);
      text-align:center;
      font-size:13px;
    }

    .messages{
      flex:1;
      overflow-y:auto;
      padding:10px;
      font-size:14px;
    }

    .msg{
      margin-bottom:8px;
      word-break:break-word;
      text-shadow:0 0 5px rgba(0,255,136,0.4);
    }

    .email{ color:var(--green); }
    .arrow{ color:var(--green); }
    .text{ color:#fff; }
    .flagged .text{ color:var(--red); }

    .input{
      display:flex;
      gap:8px;
      padding:10px;
      border-top:1px solid var(--green);
      background:#000;
    }

    .input input{ flex:1; }

    .terminal{
      border-top:1px solid var(--green);
      padding:10px;
      background:#000;
    }

    #cmd{
      width:100%;
    }
  </style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="auth">
  <h2>Login/Register Panel</h2>

  <input id="username" placeholder="username"/>
  <input id="password" type="password" placeholder="password"/>

  <button onclick="register()">REGISTER</button>
  <button onclick="login()">LOGIN</button>

  <div id="status"></div>
</div>

<!-- CHAT -->
<div id="chat" class="chat">
  <div class="header">Chat Komunitas</div>

  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="msg" placeholder="message..." />
    <button onclick="send()">SEND</button>
  </div>

  <div class="terminal">
    <input id="cmd" placeholder="/ban /unban /users /clear /msg /root" />
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://uuapjvvutoqhfwpfliup.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1YXBqdnZ1dG9xaGZ3cGZsaXVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5Nzc2MzYsImV4cCI6MjA5NjU1MzYzNn0.kZhWY_6eiU51gHXBE7F1d-n5TpLmt5_TEWjmbMGBy88"
);

let currentUser=null;
let isAdmin=false;
let last=0;

const bad=["anjing","bangsat","kontol","memek","tai"];

const $=id=>document.getElementById(id);

function email(u){return u+"@rootakses.my.id";}

function badword(t){
  return bad.some(w=>t.toLowerCase().includes(w));
}

/* REGISTER */
async function register(){
  const u=$("username").value.trim().toLowerCase();
  const p=$("password").value;

  const {data,error}=await supabase.auth.signUp({
    email:email(u),
    password:p
  });

  if(error)return $("status").innerText=error.message;

  await supabase.from("profiles").insert([{
    id:data.user.id,
    username:u,
    role:"user"
  }]);

  $("status").innerText="REGISTER SUCCESS";
}

/* LOGIN */
async function login(){
  const u=$("username").value.trim().toLowerCase();
  const p=$("password").value;

  const {data,error}=await supabase.auth.signInWithPassword({
    email:email(u),
    password:p
  });

  if(error)return $("status").innerText=error.message;

  const {data:profile}=await supabase
    .from("profiles")
    .select("*")
    .eq("id",data.user.id)
    .single();

  currentUser=profile.username;
  isAdmin=profile.role==="admin";

  $("auth").style.display="none";
  $("chat").style.display="flex";

  load();
}

/* SEND */
async function send(){
  const now=Date.now();
  if(now-last<3000)return alert("ANTI SPAM 3 DETIK");

  const m=$("msg").value;
  if(!m)return;

  const {data:banned}=await supabase
    .from("banned_users")
    .select("*")
    .eq("username",currentUser)
    .maybeSingle();

  if(banned)return alert("BANNED: "+banned.reason);

  const flagged=badword(m);

  await supabase.from("messages").insert([{
    user_id:(await supabase.auth.getUser()).data.user.id,
    username:currentUser,
    message:flagged?"[FILTERED]":m,
    flagged
  }]);

  last=now;
  $("msg").value="";
}

/* RENDER */
function render(m){
  const div=document.createElement("div");
  div.className="msg"+(m.flagged?" flagged":"");

  const displayName =
    '${m.username}@rootakses.my.id';

  div.innerHTML=`
    <span class="email">${m.username}@rootakses.my.id</span>
    <span class="arrow"> &gt; </span>
    <span class="text">${m.flagged?"[FILTERED]":m.message}</span>
  `;

  $("messages").appendChild(div);
  $("messages").scrollTop=$("messages").scrollHeight;
}

/* LOAD */
async function load(){
  const {data}=await supabase.from("messages").select("*").order("id");
  $("messages").innerHTML="";
  data.forEach(render);
}

/* REALTIME */
supabase.channel("chat")
.on("postgres_changes",
{event:"INSERT",schema:"public",table:"messages"},
p=>render(p.new))
.subscribe();

/* ADMIN COMMAND */
$("cmd").addEventListener("keydown",async e=>{
  if(e.key!=="Enter")return;

  const c=e.target.value;
  e.target.value="";

  if(!isAdmin)return alert("NO ADMIN");

  if(c==="/clear"){
    await supabase.from("messages").delete().neq("id",0);
    $("messages").innerHTML="";
  }

  if(c.startsWith("/msg ")){
    await supabase.from("messages").insert([{
      user_id:(await supabase.auth.getUser()).data.user.id,
      username:"SYSTEM",
      message:c.replace("/msg ",""),
      flagged:false
    }]);
  }

  if(c.startsWith("/ban ")){
    const [_,u,...r]=c.split(" ");
    await supabase.from("banned_users").upsert([{
      username:u,
      reason:r.join(" ")||"admin"
    }]);
  }

  if(c==="/users"){
    const {data}=await supabase.from("profiles").select("username");
    alert([...new Set(data.map(x=>x.username))].join("\n"));
  }

  if(c==="/root")alert("ROOT OK");
});

/* BUTTONS */
window.register=register;
window.login=login;
window.send=send;

</script>

</body>
</html>
